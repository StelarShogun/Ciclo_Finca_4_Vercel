# Automated checks when code lands on Dev (push after merge) or on PRs targeting Dev.
# See docs/CI.md for local parity commands and troubleshooting.

name: CI — Dev

on:
  push:
    branches:
      - Dev
  pull_request:
    branches:
      - Dev
  workflow_dispatch:

concurrency:
  group: ci-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php-checks:
    name: PHP — lint, tests, static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ciclo_finca_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ciclo_finca_test
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, openssl, pdo, mysql, pdo_mysql, tokenizer, xml, ctype, json, bcmath, curl, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.5-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-8.5-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -ularavel -ppassword --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Pint (code style)
        run: composer run lint

      - name: PHPUnit (MySQL)
        run: composer run test:mysql

      - name: PHPStan
        run: composer run phpstan

  frontend-build:
    name: Frontend — Vite production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
