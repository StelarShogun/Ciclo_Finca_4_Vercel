# CI/CD on Dev: quality gates + deploy to Render only when all checks pass.
# See docs/CI.md for secrets (RENDER_DEPLOY_HOOK_URL, MAIL_*) and Render setup.

name: CI/CD — Dev

on:
  push:
    branches:
      - Dev
  pull_request:
    branches:
      - Dev
  workflow_dispatch:

concurrency:
  group: ci-cd-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PRODUCTION_URL: https://ciclo-finca-4-app-g0j4.onrender.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  php-checks:
    name: PHP — lint, tests, static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ciclo_finca_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ciclo_finca_test
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, openssl, pdo, mysql, pdo_mysql, tokenizer, xml, ctype, json, bcmath, curl, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.5-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-8.5-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -ularavel -ppassword --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Pint (code style)
        run: composer run lint

      - name: PHPUnit (MySQL)
        run: composer run test

      - name: PHPStan
        run: composer run phpstan

      - name: Notify CI failure by email
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/Dev'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI FAILED — Ciclo Finca 4 (${{ github.sha }})"
          to: ${{ secrets.MAIL_TO }}
          from: CF4 CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            The CI pipeline failed. Production was NOT deployed.
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  frontend-build:
    name: Frontend — Vite production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Notify frontend build failure by email
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/Dev'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI FAILED (frontend build) — Ciclo Finca 4 (${{ github.sha }})"
          to: ${{ secrets.MAIL_TO }}
          from: CF4 CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            The frontend build job failed. Production was NOT deployed.
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  newman-api:
    name: API — Newman (Postman)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ciclo_finca_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ciclo_finca_test
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, openssl, pdo, mysql, pdo_mysql, tokenizer, xml, ctype, json, bcmath, curl, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -ularavel -ppassword --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run migrations
        run: php artisan migrate --force

      - name: Start application server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 --no-reload &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/up >/dev/null; then
              echo "Application server is up"
              exit 0
            fi
            sleep 2
          done
          echo "Application server did not become ready in time"
          exit 1

      - name: Newman — CF4 Storefront API collection
        run: API_BASE_URL=http://127.0.0.1:8000 npm run test:api

  browser-dusk:
    name: UI — Laravel Dusk (Selenium)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ciclo_finca_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      selenium:
        image: selenium/standalone-chromium
        ports:
          - 4444:4444
        options: >-
          --shm-size=2gb
          --add-host=host.docker.internal:host-gateway

    env:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ciclo_finca_test
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, openssl, pdo, mysql, pdo_mysql, tokenizer, xml, ctype, json, bcmath, curl, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -ularavel -ppassword --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run migrations
        run: php artisan migrate --force

      - name: Configure Dusk environment
        run: |
          APP_KEY="$(grep '^APP_KEY=' .env | cut -d= -f2-)"
          cat > .env.dusk.local <<EOF
          APP_NAME="Ciclo Finca"
          APP_ENV=local
          APP_KEY=${APP_KEY}
          APP_DEBUG=true
          APP_URL=http://host.docker.internal:8000
          LARAVEL_SAIL=1
          DUSK_DRIVER_URL=http://localhost:4444/wd/hub
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=ciclo_finca_test
          DB_USERNAME=laravel
          DB_PASSWORD=password
          SESSION_DRIVER=database
          SESSION_SECURE_COOKIE=false
          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          MAIL_MAILER=log
          PULSE_ENABLED=true
          RECAPTCHA_SITE_KEY=
          RECAPTCHA_SECRET_KEY=
          EOF
          cp .env.dusk.local .env

      - name: Wait for Selenium
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4444/status >/dev/null; then
              echo "Selenium is up"
              exit 0
            fi
            sleep 2
          done
          echo "Selenium did not become ready in time"
          exit 1

      - name: Start application server
        run: |
          php artisan serve --host=0.0.0.0 --port=8000 --no-reload &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/up >/dev/null; then
              echo "Application server is up"
              exit 0
            fi
            sleep 2
          done
          echo "Application server did not become ready in time"
          exit 1

      - name: Dusk — Seguimiento 8 UI tests
        run: php artisan dusk --group=seguimiento8 --without-tty

  deploy:
    name: CD — Deploy to Render (production)
    needs:
      - php-checks
      - frontend-build
      - newman-api
      - browser-dusk
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/Dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not configured. Skipping deploy trigger."
            exit 1
          fi
          echo "All CI checks passed. Triggering Render deploy..."
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for production health check
        run: |
          echo "Waiting for ${{ env.PRODUCTION_URL }}/up ..."
          for i in $(seq 1 36); do
            if curl -fsS "${{ env.PRODUCTION_URL }}/up" >/dev/null; then
              echo "Production health check passed."
              exit 0
            fi
            echo "Attempt ${i}/36 — not ready yet, sleeping 10s..."
            sleep 10
          done
          echo "Production did not become healthy within the timeout."
          exit 1

      - name: Smoke test storefront home
        run: |
          curl -fsS "${{ env.PRODUCTION_URL }}/" -o /dev/null
          echo "Storefront home responded successfully."

      - name: Notify deploy success by email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI/CD SUCCESS — Deploy authorized — Ciclo Finca 4"
          to: ${{ secrets.MAIL_TO }}
          from: CF4 CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            All CI checks passed and Render deploy was triggered.
            Production URL: ${{ env.PRODUCTION_URL }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify deploy failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CD FAILED — Ciclo Finca 4 deploy/health check (${{ github.sha }})"
          to: ${{ secrets.MAIL_TO }}
          from: CF4 CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            CI passed but deploy or post-deploy health check failed.
            Review the workflow logs before retrying.
            Production URL: ${{ env.PRODUCTION_URL }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
