name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_ALLOW_SUPERUSER: 1
  COMPOSER_PROCESS_TIMEOUT: 0

jobs:
  php-quality:
    name: PHP — calidad y pruebas
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, openssl, pdo_sqlite, sqlite3, tokenizer, xml, curl, ctype, json, bcmath, intl, zip, gd
          coverage: none
          tools: composer:v2

      - name: Validate composer.json / composer.lock
        run: |
          set -euo pipefail
          composer validate --strict --no-check-publish

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: |
          set -euo pipefail
          composer install --prefer-dist --no-progress --no-ansi --optimize-autoloader

      - name: Check platform requirements
        run: |
          set -euo pipefail
          composer check-platform-reqs

      - name: Composer audit (seguridad)
        run: |
          set -euo pipefail
          composer audit

      - name: Prepare application environment
        run: |
          set -euo pipefail
          if [[ ! -f .env ]]; then
            cp .env.example .env
          fi
          php artisan key:generate --force --ansi

      - name: Laravel Pint (estilo, sin escribir archivos)
        run: |
          set -euo pipefail
          ./vendor/bin/pint --test

      - name: Run tests
        env:
          APP_ENV: testing
        run: |
          set -euo pipefail
          composer test

  frontend-build:
    name: Frontend — dependencias y build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: npm audit (nivel high+)
        run: |
          set -euo pipefail
          npm audit --audit-level=high

      - name: Build production assets
        env:
          NODE_ENV: production
        run: |
          set -euo pipefail
          npm run build

  dependency-review:
    name: Revisión de dependencias (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
