# Mismo nombre de proyecto que antes = reutiliza el volumen dbdata_ciclo con tus datos
name: ciclo_finca_4_app

services:
  app_ciclo:
    build: .
    container_name: laravel_app_ciclo
    ports:
      - "8080:80"
      - "5173:5173"
    volumes:
      - .:/var/www/html
    # No inyectar DB_DATABASE / usuario / contraseña: el volumen monta `.env` y en tests
    # Laravel carga `.env.testing` sin que Compose pise el nombre de BD (p. ej. laravel_test).
    environment:
      - DB_HOST=db_ciclo
      - DB_PORT=3306
      - VITE_PORT=5173
    depends_on:
      - db_ciclo

  db_ciclo:
    image: mysql:8.0
    container_name: mysql_db_ciclo
    restart: always
    # Permite DB_HOST=db en .env (alias al mismo contenedor que db_ciclo)
    networks:
      default:
        aliases:
          - db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root
    # Puerto 3307 en el host: el 3306 suele estar ocupado por MySQL local u otros contenedores
    ports:
      - "3307:3306"
    volumes:
      - dbdata_ciclo:/var/lib/mysql

  phpmyadmin_ciclo:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_ciclo
    restart: always
    environment:
      PMA_HOST: db_ciclo
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db_ciclo

volumes:
  dbdata_ciclo:
