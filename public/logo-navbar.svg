<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80" width="460" height="80" role="img" aria-label="Ciclo Finca 4">
  <title>Ciclo Finca 4</title>
  <defs>
    <linearGradient id="cf4g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e7d32"/>
      <stop offset="1" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>

  <!-- Mark (icon) -->
  <g transform="translate(12 8)">
    <!-- Outer ring -->
    <circle cx="32" cy="32" r="28" fill="none" stroke="url(#cf4g)" stroke-width="4"/>

    <!-- Chain dots (kept chunky for small sizes) -->
    <g fill="#000000">
      <circle cx="32" cy="4"  r="2.2"/>
      <circle cx="48" cy="8"  r="2.2"/>
      <circle cx="56" cy="24" r="2.2"/>
      <circle cx="52" cy="40" r="2.2"/>
      <circle cx="40" cy="54" r="2.2"/>
      <circle cx="24" cy="60" r="2.2"/>
      <circle cx="10" cy="52" r="2.2"/>
      <circle cx="4"  cy="36" r="2.2"/>
      <circle cx="8"  cy="18" r="2.2"/>
      <circle cx="20" cy="6"  r="2.2"/>
    </g>

    <!-- Inner disc -->
    <circle cx="32" cy="32" r="20" fill="#ffffff" stroke="#1b5e20" stroke-width="1.5" opacity="0.95"/>

    <!-- Minimal bike glyph -->
    <g stroke="#1b5e20" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="24" cy="40" r="5.4"/>
      <circle cx="40" cy="40" r="5.4"/>
      <path d="M28 40 L33 30 L40 40"/>
      <path d="M33 30 L29 30"/>
      <path d="M33 30 L36 26"/>
      <path d="M36 26 L42 26"/>
      <path d="M36 26 L40 40"/>
    </g>

    <!-- Mountain hint -->
    <path d="M16 32 L24 22 L32 30 L40 20 L48 32" fill="none" stroke="#2e7d32" stroke-width="2" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  
</svg>

